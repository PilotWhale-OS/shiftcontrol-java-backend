server:
  port: 8089
spring:
  application:
    name: auditlog-service
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  mvc:
    servlet:
      path: ${AUDITLOG_REST_PATH_PREFIX:/}
  rabbitmq:
    addresses: rabbitmq:5672
    username: shiftcontrol
    password: password
  jpa:
    properties:
      hibernate:
        type:
          json_format_mapper: jsonb
oidc:
  provider:
    issuer-uri: http://keycloak.127.0.0.1.nip.io/realms/dev
    allowed-issuers:
      - http://keycloak.127.0.0.1.nip.io/realms/dev
      - http://keycloak:8080/realms/dev

logging:
  level:
    'org.hibernate.orm.connections.pooling': WARN

audit:
  rabbitmq:
    exchange: shiftcontrol
    queue: auditlog
    routingKey: '#'
