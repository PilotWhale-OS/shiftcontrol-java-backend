spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  rabbitmq:
    addresses: rabbitmq:5672
    username: shiftcontrol
    password: password
  jackson:
    default-property-inclusion: non_null
  mvc:
    servlet:
      path: ${SHIFTSERVICE_REST_PATH_PREFIX:}
  jpa:
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak.127.0.0.1.nip.io/realms/dev
  liquibase:
    change-log: classpath:db/changelog-master.xml
    enabled: true
    contexts: ${SPRING_LIQUIBASE_CONTEXTS:dev}
keycloak:
    auth-server-url: http://keycloak.127.0.0.1.nip.io/
    auth-realm: dev
    allowed-issuers:
      - http://keycloak.127.0.0.1.nip.io/realms/dev
      - http://keycloak:8080/realms/dev
    client:
      id: admin-cli
      realm: master
      username: admin
      password: admin

management:
  otlp:
    metrics:
      export:
        enabled: false

pretalx:
  locale: en
  sync:
    cron: "0 0/5 * * * *" # every 5 minutes
