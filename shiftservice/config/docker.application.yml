spring:
  jackson:
    default-property-inclusion: non_null
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${oidc.provider.issuer-uri}
logging:
  level:
    root: INFO

oidc:
  provider:
    issuer-uri: http://keycloak:8080/realms/dev
    allowed-issuers:
      - http://keycloak.127.0.0.1.nip.io/realms/dev
      - http://keycloak:8080/realms/dev
shiftcontrol:
  internal-api:
    key: ${SHIFTCONTROL_INTERNAL_API_KEY:}
